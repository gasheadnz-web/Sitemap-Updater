name: Daily Sitemap Update

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  update-sitemap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (no built-in auth)
        uses: actions/checkout@v4
        with:
          persist-credentials: false   # ← CRITICAL FIX

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run sitemap updater
        run: python update_sitemap.py

      - name: Commit and push changes
        env:
          TOKEN: ${{ secrets.PAT }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git add sitemap.xml .state.json
          git commit -m "Automated sitemap update" || echo "No changes to commit"

          # Force PAT authentication
          git remote set-url origin https://$TOKEN@github.com/gasheadnz-web/Sitemap-Updater.git

          git push origin main
