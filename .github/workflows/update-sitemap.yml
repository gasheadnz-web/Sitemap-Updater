name: Daily Sitemap Update

on:
  schedule:
    - cron: "0 15 * * *"   # 03:00 GMT = 15:00 NZST
  workflow_dispatch:

jobs:
  update-sitemap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sitemap updater
        run: python update_sitemap.py

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add sitemap.xml _state.json
          git commit -m "Automated sitemap update" || echo "No changes to commit"
          git push
